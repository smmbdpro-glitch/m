; ====== Basic Error Handling ======
display_errors = Off
log_errors = On
error_log = /home/wintersm/public_html/php_errors.log

; ====== Resource Limits ======
max_execution_time = 300
max_input_time = 120
memory_limit = 1024M

; ====== Input Handling ======
max_input_vars = 5000
post_max_size = 100M
upload_max_filesize = 100M

; ====== Session Settings ======
session.gc_maxlifetime = 3600
session.save_path = "/var/cpanel/php/sessions/ea-php74"

; ====== Output Compression ======
zlib.output_compression = On

; ====== File Uploads ======
file_uploads = On

; ====== Timezone (Set your actual timezone) ======
date.timezone = Asia/Dhaka
